<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Superteam Canada Resources</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Curated resources for the Canadian Solana / Superteam Canada ecosystem">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #14F195;
      --theme-color-dark: #9945FF;
    }
    .sidebar-nav > ul > li > a {
      font-weight: 700;
    }
    .markdown-section a {
      color: var(--theme-color-dark);
    }
    .markdown-section a:hover {
      color: var(--theme-color);
    }
    .app-name-link img {
      max-width: 120px;
    }
    body {
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
    }
    .sidebar {
      background: #0d0d0d;
    }
    .sidebar-nav {
      color: #fff;
    }
    .markdown-section {
      background: #fff;
      border-radius: 8px;
      padding: 30px;
      margin: 20px;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '🇨🇦 Superteam Canada',
      repo: 'https://github.com/simistern/superteam-resources',
      loadSidebar: true,
      subMaxLevel: 2,
      search: 'auto',
      auto2top: true,
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
